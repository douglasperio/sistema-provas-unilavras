{% extends "base.html" %}
{% block title %}{{ 'Editar Prova' if prova else 'Nova Prova' }}{% endblock %}
{% block content %}
<div class="d-flex align-items-center gap-2 mb-4">
  <a href="{{ url_for('provas_index') }}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h4 class="fw-bold mb-0">{{ 'Editar Prova' if prova else 'Nova Prova' }}</h4>
</div>

<div class="card" style="max-width:600px;">
  <div class="card-body">
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">Título da Prova</label>
        <input type="text" name="titulo" class="form-control" required
               value="{{ prova.titulo if prova else '' }}"
               placeholder="Ex: Avaliação Bimestral – Anatomia Dental">
      </div>
      <div class="row g-3 mb-3">
        <div class="col-md-8">
          <label class="form-label fw-semibold">Disciplina</label>
          <input type="text" name="disciplina" class="form-control"
                 value="{{ prova.disciplina if prova else '' }}"
                 placeholder="Ex: Anatomia Dental">
        </div>
        <div class="col-md-4">
          <label class="form-label fw-semibold">Valor Total (pts)</label>
          <input type="number" name="valor_total" class="form-control"
                 min="0" step="0.5" value="{{ prova.valor_total if prova else 10 }}">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Instruções (opcional)</label>
        <textarea name="instrucoes" class="form-control" rows="3"
                  placeholder="Ex: Leia atentamente. Cada questão vale 1,0 ponto.">{{ prova.instrucoes if prova else '' }}</textarea>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-arrow-right me-1"></i> Próximo: Questões
        </button>
        <a href="{{ url_for('provas_index') }}" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
