{% extends "base.html" %}
{% block title %}{{ 'Editar Turma' if turma else 'Nova Turma' }}{% endblock %}
{% block content %}
<div class="d-flex align-items-center gap-2 mb-4">
  <a href="{{ url_for('turmas_index') }}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h4 class="fw-bold mb-0">{{ 'Editar Turma' if turma else 'Nova Turma' }}</h4>
</div>

<div class="card" style="max-width:480px;">
  <div class="card-body">
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">Nome da Turma</label>
        <input type="text" name="nome" class="form-control" required
               value="{{ turma.nome if turma else '' }}" placeholder="Ex: 3º Período">
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Período / Semestre</label>
        <input type="text" name="periodo" class="form-control"
               value="{{ turma.periodo if turma else '' }}" placeholder="Ex: 2026-1">
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg me-1"></i> Salvar
        </button>
        <a href="{{ url_for('turmas_index') }}" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
